<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>雷达卫士 · 即时看板</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <style>
        body { background: #0a0f1e; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: rgba(20,28,48,0.7); border-radius: 20px; padding: 16px; margin-bottom: 20px; }
        .stats { display: flex; gap: 16px; flex-wrap: wrap; }
        .stat { background: rgba(0,0,0,0.4); border-radius: 16px; padding: 12px; text-align: center; flex: 1; }
        .stat-label { font-size: 0.7rem; color: #8aa2cf; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: #f97316; }
        button { background: #3b82f6; border: none; padding: 8px 16px; border-radius: 30px; color: white; cursor: pointer; margin-top: 8px; }
        #distanceChart { height: 300px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="card">
    <h2>📡 雷达卫士 · 直连看板</h2>
    <div class="stats">
        <div class="stat"><div class="stat-label">👤 人员状态</div><div id="presence" class="stat-value">--</div></div>
        <div class="stat"><div class="stat-label">📏 距离</div><div id="distance" class="stat-value">--<span style="font-size:0.9rem;">cm</span></div></div>
        <div class="stat"><div class="stat-label">🏃 运动</div><div id="motion" class="stat-value">--</div></div>
        <div class="stat"><div class="stat-label">⏱️ 最后更新</div><div id="timestamp" class="stat-value" style="font-size:1rem;">--</div></div>
    </div>
    <div id="distanceChart"></div>
    <div style="text-align:center; margin-top:16px;"><button id="refreshBtn">🔄 手动刷新</button></div>
</div>

<script>
    // ========== 请修改为您的实际信息 ==========
    const MASTER_KEY = 'C8vpPw9p4YnncYVJ5eVvo+kfNaPxJdVf3wkl9SlXTYs=';   // 产品 MasterKey
    const DEVICE_NAME = 'LD-24-01';                                     // 设备名称
    // ==========================================

    // 使用公共 CORS 代理（无需自己部署）
    const CORS_PROXY = 'https://corsproxy.io/?url=';
    const API_BASE = 'https://api.heclouds.com/devices';

    let chart = null;
    let historyData = [];

    async function fetchStream(streamId) {
        const targetUrl = `${API_BASE}/${DEVICE_NAME}/datastreams/${streamId}/datapoint?type=3`;
        const proxyUrl = CORS_PROXY + encodeURIComponent(targetUrl);
        try {
            const resp = await fetch(proxyUrl, {
                headers: { 'api-key': MASTER_KEY }
            });
            const text = await resp.text();
            // 如果返回 HTML 则出错
            if (text.startsWith('<!DOCTYPE') || text.startsWith('<html')) {
                throw new Error('Proxy returned HTML, maybe CORS proxy failed');
            }
            const json = JSON.parse(text);
            if (json.errno === 0 && json.data && json.data.value !== undefined) {
                return json.data.value;
            }
            return null;
        } catch(e) {
            console.error(`fetch ${streamId} error:`, e);
            return null;
        }
    }

    async function refreshAll() {
        const [presence, motion, distance] = await Promise.all([
            fetchStream('presence'), fetchStream('motion'), fetchStream('distance')
        ]);
        const now = new Date();
        document.getElementById('timestamp').innerText = now.toLocaleTimeString();
        document.getElementById('presence').innerHTML = (presence === 1 || presence === true) ? '🟢 有人' : '⚪ 无人';
        document.getElementById('motion').innerHTML = (motion === 1 || motion === true) ? '🏃 运动中' : '🧘 静止';
        const distVal = (distance !== null && distance !== undefined) ? distance : '--';
        document.getElementById('distance').innerHTML = (distVal !== '--') ? distVal + '<span style="font-size:0.9rem;">cm</span>' : '--';

        if (distance !== null && distance !== undefined && distance > 0) {
            updateChart(distance, motion, now.getTime());
        }
    }

    function initChart() {
        const dom = document.getElementById('distanceChart');
        chart = echarts.init(dom);
        chart.setOption({
            backgroundColor: 'transparent',
            tooltip: { trigger: 'axis' },
            legend: { data: ['距离 (cm)'], textStyle: { color: '#cbd5e6' }, left: 'center', top: 0 },
            grid: { left: '10%', right: '10%', top: '15%', bottom: '10%', containLabel: true },
            xAxis: { type: 'time', name: '时间', nameTextStyle: { color: '#8aa2cf' }, axisLabel: { color: '#b9ceff', rotate: 30 } },
            yAxis: { type: 'value', name: '距离 (cm)', min: 0, max: 600, axisLabel: { color: '#cbd5e6' } },
            series: [{ name: '距离 (cm)', type: 'line', smooth: true, symbol: 'circle', lineStyle: { color: '#60a5fa' }, data: [] }]
        });
    }

    function updateChart(distance, motion, timestampMs) {
        if (!chart) initChart();
        const time = new Date(timestampMs);
        historyData.push([time, distance]);
        if (historyData.length > 30) historyData.shift();
        chart.setOption({ series: [{ data: historyData }] });
    }

    document.getElementById('refreshBtn').addEventListener('click', () => refreshAll());
    initChart();
    refreshAll();
    setInterval(refreshAll, 5000);
</script>
</body>
</html>
