<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>雷达卫士 · 扇形波束看板</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #12182e 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', 'Poppins', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            padding: 16px 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dashboard {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
        }
        .glass-card {
            background: rgba(20, 28, 48, 0.7);
            backdrop-filter: blur(18px);
            border-radius: 32px;
            border: 1px solid rgba(96, 165, 250, 0.2);
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(255,255,255,0.03);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .header {
            padding: 20px 16px 12px;
            text-align: center;
            border-bottom: 1px solid rgba(96,165,250,0.2);
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #e0f2fe, #7ab3ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .sub {
            font-size: 0.7rem;
            color: #8aa2cf;
            margin-top: 4px;
        }
        /* 雷达平面图区域 */
        .radar-section {
            padding: 20px 16px 8px;
            display: flex;
            justify-content: center;
        }
        .radar-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            box-shadow: 0 0 0 1px rgba(59,130,246,0.3);
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 20px;
        }
        .radar-label {
            text-align: center;
            margin-top: 12px;
            font-size: 0.7rem;
            color: #6c86b0;
            letter-spacing: 1px;
        }
        /* 状态卡片 */
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 12px 16px 20px;
        }
        .stat-item {
            flex: 1 1 calc(50% - 12px);
            background: rgba(0,0,0,0.35);
            border-radius: 24px;
            padding: 12px 8px;
            text-align: center;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(96,165,250,0.15);
        }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            color: #8aa2cf;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 1.7rem;
            font-weight: 700;
            color: white;
            line-height: 1.2;
        }
        .stat-unit {
            font-size: 0.8rem;
            color: #8aa2cf;
        }
        .badge {
            display: inline-block;
            background: rgba(59,130,246,0.2);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.65rem;
            margin-top: 6px;
            color: #9bbaf5;
        }
        .badge-alarm {
            background: rgba(239,68,68,0.25);
            color: #ff9090;
            animation: subtle-pulse 1.5s infinite;
        }
        .badge-safe {
            background: rgba(34,197,94,0.2);
            color: #6ee7b7;
        }
        @keyframes subtle-pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; text-shadow: 0 0 3px rgba(239,68,68,0.5);}
            100% { opacity: 0.7; }
        }
        /* 图表区域 */
        .chart-wrapper {
            padding: 0 16px 20px;
        }
        .chart-card {
            background: rgba(0,0,0,0.3);
            border-radius: 28px;
            padding: 8px;
        }
        #distanceChart {
            width: 100%;
            height: 260px;
        }
        .footer-note {
            text-align: center;
            padding: 14px;
            font-size: 0.6rem;
            color: #4f6b96;
            border-top: 1px solid rgba(96,165,250,0.1);
        }
        @media (min-width: 640px) {
            .dashboard { max-width: 700px; }
            .stat-value { font-size: 2rem; }
            #distanceChart { height: 300px; }
        }
        @media (max-width: 480px) {
            .stat-value { font-size: 1.4rem; }
            .radar-container { max-width: 280px; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="glass-card">
        <div class="header">
            <h1>📡 雷达卫士 · 扇形波束</h1>
            <div class="sub">LD2410B 毫米波雷达 | 120° 波束角 · 最大距离 600cm</div>
        </div>

        <!-- 雷达平面图区域（扇形+网格坐标） -->
        <div class="radar-section">
            <div class="radar-container">
                <canvas id="radarCanvas" width="500" height="500"></canvas>
            </div>
            <div class="radar-label">⚡ 波束中心线方向 · 橙色光点代表目标距离位置</div>
        </div>

        <!-- 状态指标 -->
        <div class="stats-grid">
            <div class="stat-item"><div class="stat-label">👤 人员状态</div><div class="stat-value" id="presenceValue">--</div><div class="badge" id="presenceBadge">等待数据</div></div>
            <div class="stat-item"><div class="stat-label">📏 距离</div><div class="stat-value"><span id="distanceValue">--</span><span class="stat-unit">cm</span></div></div>
            <div class="stat-item"><div class="stat-label">🏃 运动</div><div class="stat-value" id="motionValue">--</div></div>
            <div class="stat-item"><div class="stat-label">⏱️ 最后更新</div><div class="stat-value" style="font-size:0.9rem;" id="timestamp">--</div></div>
        </div>

        <!-- 距离 + 运动 双轴曲线 -->
        <div class="chart-wrapper">
            <div class="chart-card">
                <div id="distanceChart"></div>
            </div>
        </div>
        <div class="footer-note">
            🔗 数据来自 OneNET 公开API | 左轴距离(cm) · 右轴运动(0=静止/1=运动) | 雷达波束扇区中心方向0°
        </div>
    </div>
</div>

<script>
    // ---------- 1. 获取设备ID ----------
    function getDeviceId() { const params = new URLSearchParams(window.location.search); return params.get('id'); }
    const deviceId = getDeviceId();
    const API_BASE = 'http://api.heclouds.com/devices';

    // ---------- 2. DOM 元素 ----------
    const presenceEl = document.getElementById('presenceValue');
    const presenceBadge = document.getElementById('presenceBadge');
    const distanceEl = document.getElementById('distanceValue');
    const motionEl = document.getElementById('motionValue');
    const timestampEl = document.getElementById('timestamp');

    // ---------- 3. 雷达画布 (大喇叭形状扇形 + 地图坐标) ----------
    const radarCanvas = document.getElementById('radarCanvas');
    let ctx = radarCanvas.getContext('2d');
    let currentDistance = 0;
    let currentPresence = 0;
    let animationId = null;
    let scanAngle = 0; // 扫描线角度，用于动态效果

    function setCanvasSize() {
        const size = 500;
        radarCanvas.width = size;
        radarCanvas.height = size;
        drawRadar();
    }

    function drawRadar() {
        const w = radarCanvas.width, h = radarCanvas.height;
        const centerX = w/2, centerY = h/2;
        const maxRadius = w/2 - 20;  // 最大距离对应600cm
        ctx.clearRect(0, 0, w, h);
        
        // 背景
        ctx.fillStyle = '#030f1f';
        ctx.fillRect(0, 0, w, h);
        
        // 绘制扇形（120°，以正东方向为中心，左右各60°）
        const startAngle = -60 * Math.PI/180;
        const endAngle = 60 * Math.PI/180;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, maxRadius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = 'rgba(59,130,246,0.2)';
        ctx.fill();
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // 绘制扇形边框（强调大喇叭形状）
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + maxRadius * Math.cos(startAngle), centerY + maxRadius * Math.sin(startAngle));
        ctx.lineTo(centerX + maxRadius * Math.cos(endAngle), centerY + maxRadius * Math.sin(endAngle));
        ctx.closePath();
        ctx.strokeStyle = '#f97316';
        ctx.lineWidth = 1.8;
        ctx.stroke();
        
        // 绘制网格线（类似地图坐标：极坐标网格线）
        // 径向线：每隔15°一条（除边界外）
        for (let angle = -60; angle <= 60; angle += 15) {
            if (Math.abs(angle) === 60) continue; // 边界已经画过
            let rad = angle * Math.PI/180;
            let x = centerX + maxRadius * Math.cos(rad);
            let y = centerY + maxRadius * Math.sin(rad);
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(x, y);
            ctx.strokeStyle = '#2c5a8c';
            ctx.lineWidth = 0.6;
            ctx.stroke();
        }
        // 距离环（同心圆弧）：100, 200, 300, 400, 500, 600cm
        for (let r = maxRadius/6; r <= maxRadius; r += maxRadius/6) {
            ctx.beginPath();
            ctx.arc(centerX, centerY, r, startAngle, endAngle);
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 1;
            ctx.stroke();
            let distCm = Math.round( (r / maxRadius) * 600 );
            if (distCm % 100 === 0 || r === maxRadius/6) {
                ctx.fillStyle = '#7e95c0';
                ctx.font = '10px "Segoe UI"';
                ctx.fillText(`${distCm}cm`, centerX + r - 12, centerY - 4);
            }
        }
        
        // 绘制中心原点
        ctx.beginPath();
        ctx.arc(centerX, centerY, 5, 0, 2*Math.PI);
        ctx.fillStyle = '#60a5fa';
        ctx.fill();
        
        // 标注坐标轴示意（X轴为0°方向，Y轴为90°方向）
        ctx.fillStyle = '#6c86b0';
        ctx.font = '9px sans-serif';
        ctx.fillText('X (0°)', centerX + maxRadius - 20, centerY - 8);
        ctx.fillText('Y (90°)', centerX + 2, centerY - maxRadius + 12);
        ctx.fillText('120°', centerX + maxRadius*0.6, centerY - 15);
        
        // 绘制动态扫描线（旋转的短线）
        let rad = scanAngle * Math.PI/180;
        let lineEndX = centerX + maxRadius * Math.cos(rad);
        let lineEndY = centerY + maxRadius * Math.sin(rad);
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(lineEndX, lineEndY);
        ctx.strokeStyle = 'rgba(96, 165, 250, 0.7)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        
        // 绘制目标光点（如果有人且距离有效）
        if (currentPresence === 1 && currentDistance > 0 && currentDistance <= 600) {
            let radiusRatio = currentDistance / 600;
            let targetRadius = radiusRatio * maxRadius;
            // 目标位于中心线（0°方向）
            const angleRad = 0;
            let x = centerX + targetRadius * Math.cos(angleRad);
            let y = centerY + targetRadius * Math.sin(angleRad);
            ctx.beginPath();
            ctx.arc(x, y, 8, 0, 2*Math.PI);
            ctx.fillStyle = '#f97316';
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#ff9933';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, 2*Math.PI);
            ctx.fillStyle = 'rgba(255, 153, 51, 0.3)';
            ctx.fill();
            ctx.fillStyle = '#ffd966';
            ctx.font = 'bold 11px monospace';
            ctx.shadowBlur = 0;
            ctx.fillText(`${currentDistance}cm`, x+12, y-6);
        }
        
        // 动态扫描线动画效果
        scanAngle = (scanAngle + 2) % 360;
        requestAnimationFrame(() => drawRadar());  // 持续动画
    }

    // ---------- 4. 双轴曲线 ----------
    let chart = null;
    let historyData = [];
    const MAX_POINTS = 30;

    function initChart() {
        const dom = document.getElementById('distanceChart');
        chart = echarts.init(dom);
        chart.setOption({
            backgroundColor: 'transparent',
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, backgroundColor: 'rgba(0,0,0,0.75)', borderColor: '#3b82f6', textStyle: { color: '#fff' } },
            legend: { data: ['距离 (cm)', '运动状态'], textStyle: { color: '#cbd5e6' }, itemWidth: 25, itemHeight: 14, right: 10, top: 0 },
            grid: { left: '10%', right: '12%', top: '15%', bottom: '12%', containLabel: true },
            xAxis: { type: 'time', name: '时间', nameTextStyle: { color: '#8aa2cf', fontWeight: 'bold' }, axisLabel: { color: '#b9ceff', rotate: 30, fontSize: 10 }, axisLine: { lineStyle: { color: '#3b82f6' } } },
            yAxis: [
                { type: 'value', name: '距离 (cm)', nameTextStyle: { color: '#8aa2cf', fontWeight: 'bold' }, axisLabel: { color: '#cbd5e6' }, splitLine: { lineStyle: { color: '#1f2a48', type: 'dashed' } }, min: 0, max: 600 },
                { type: 'value', name: '运动', nameTextStyle: { color: '#f97316', fontWeight: 'bold' }, axisLabel: { color: '#f97316', formatter: v => v===1?'运动':(v===0?'静止':'') }, splitLine: { show: false }, min: -0.2, max: 1.2, interval: 1 }
            ],
            series: [
                { name: '距离 (cm)', type: 'line', smooth: true, symbol: 'circle', symbolSize: 5, lineStyle: { width: 2, color: '#60a5fa' }, areaStyle: { opacity: 0.2, color: '#3b82f6' }, data: [], yAxisIndex: 0 },
                { name: '运动状态', type: 'line', step: 'end', symbol: 'diamond', symbolSize: 6, lineStyle: { width: 2, color: '#f97316', type: 'dashed' }, data: [], yAxisIndex: 1, itemStyle: { color: params => params.value===1 ? '#f97316' : '#6c86b0' } }
            ]
        });
    }

    function updateCharts(distance, motion, timestampMs) {
        if (!chart) initChart();
        const time = new Date(timestampMs);
        historyData.push({ time, distance, motion: motion===1?1:0 });
        if (historyData.length > MAX_POINTS) historyData.shift();
        chart.setOption({
            series: [
                { data: historyData.map(p => [p.time, p.distance]), yAxisIndex: 0 },
                { data: historyData.map(p => [p.time, p.motion]), yAxisIndex: 1 }
            ]
        });
    }

    // ---------- 5. OneNET 数据获取 ----------
    async function fetchDataStream(streamName) {
        if (!deviceId) return null;
        const url = `${API_BASE}/${deviceId}/datastreams/${streamName}/datapoint?type=3`;
        try {
            const resp = await fetch(url);
            if (!resp.ok) return null;
            const json = await resp.json();
            return json.data?.value;
        } catch(e) { console.warn(`fetch ${streamName} error`, e); return null; }
    }

    async function refreshData() {
        if (!deviceId) {
            presenceEl.innerHTML = '⚠️ 无设备ID'; presenceBadge.innerHTML = 'URL缺少 ?id=xxx';
            distanceEl.innerHTML = '--'; motionEl.innerHTML = '--'; timestampEl.innerHTML = '--';
            currentDistance = 0; currentPresence = 0;
            return;
        }
        const [presence, motion, distance] = await Promise.all([
            fetchDataStream('presence'), fetchDataStream('motion'), fetchDataStream('distance')
        ]);
        const now = new Date();
        const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
        currentPresence = (presence === 1) ? 1 : 0;
        currentDistance = (distance !== null && distance !== undefined && distance > 0) ? distance : 0;

        if (presence === 1) { presenceEl.innerHTML = '🟢 有人'; presenceBadge.innerHTML = '⚠️ 人员在场'; presenceBadge.className = 'badge badge-alarm'; }
        else if (presence === 0) { presenceEl.innerHTML = '⚪ 无人'; presenceBadge.innerHTML = '✓ 环境安静'; presenceBadge.className = 'badge badge-safe'; }
        else { presenceEl.innerHTML = '❓ 未知'; presenceBadge.className = 'badge'; }
        distanceEl.innerHTML = (currentDistance !== 0) ? currentDistance : '--';
        motionEl.innerHTML = (motion === 1) ? '🏃 运动中' : (motion === 0 ? '🧘 静止' : '❓ 未知');
        timestampEl.innerHTML = timeStr;

        if (currentDistance > 0 && currentDistance <= 600) updateCharts(currentDistance, motion, now.getTime());
        else if (currentPresence === 0) updateCharts(0, motion, now.getTime());
    }

    // ---------- 6. 启动 ----------
    if (deviceId) {如果 (deviceId设备ID) {
        setCanvasSize设置画布大小();设置画布大小();
        initChart();初始化图表();
        refreshData();刷新数据();
        setInterval(refreshData, 2000);
    } else {} 否则 {
        setCanvasSize();设置画布大小();
        initChart();初始化图表();
        presenceEl.innerHTML = '📌 未绑定'; presenceBadge.innerHTML = '请在链接后添加 ?id=设备ID';
        distanceEl.innerHTML = '--'; motionEl.innerHTML = '--'; timestampEl.innerHTML = '--';
    }
    window.addEventListener('resize', () => { drawRadar(); if(chart) chart.resize(); });
</script>
</body></正文>
</html>
